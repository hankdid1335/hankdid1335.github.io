<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能選單</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7fa;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            text-align: center;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            background: #0078d7;
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #005ea6;
        }

        @media (max-width: 480px) {
            .btn {
                font-size: 16px;
                padding: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="btn" href="https://hankdid1335.github.io/off_days/index.html">設定</a>
        <a class="btn" href="https://hankdid1335.github.io/off_days/index.html">刪舊資料</a>
        <a class="btn" href="https://hankdid1335.github.io/off_days/index.html">測試</a>
    </div>
</body>
</html>
